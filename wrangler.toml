name = "rubeus"
compatibility_date = "2024-12-05"
main = "src/index.ts"
compatibility_flags = [ "nodejs_compat" ]

[vars]
ENVIRONMENT = 'dev'
CUSTOM_HEADERS_TO_IGNORE = []

#
#Configuration for DEVELOPMENT environment
#
[env.staging]
name = "rubeus-dev"

[env.staging.vars]
ENVIRONMENT = 'staging'
CUSTOM_HEADERS_TO_IGNORE = []


#
# Production on custom domain (portkey.pollinations.ai)
# Uses pollinations.ai zone proxy_read_timeout (600s) instead of workers.dev default (~100s)
#
[env.production]
name = "rubeus-pollinations"
logpush=true
routes = [
    { pattern = "portkey.pollinations.ai", custom_domain = true }
]

[env.production.vars]
ENVIRONMENT = 'production'
CUSTOM_HEADERS_TO_IGNORE = []
